<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050805"/>
      <stop offset="100%" stop-color="#0d1f0d"/>
    </linearGradient>
    <style>
      .bg { fill: url(#bgGrad); }
      .header-bar { fill: #161b16; }
      .name { font-family: 'Courier New', Courier, monospace; font-size: 46px; font-weight: bold; fill: #39FF14; }
      .prompt { font-family: 'Courier New', Courier, monospace; font-size: 16px; fill: #5fae5f; }
      .line { font-family: 'Courier New', Courier, monospace; font-size: 17px; fill: #c9ffcf; }
      .accent { fill: #39FF14; }
      .cursor { fill: #39FF14; }
    </style>
  </defs>

  <rect class="bg" width="900" height="280" rx="10"/>

  <!-- Terminal header -->
  <rect class="header-bar" width="900" height="36" rx="10"/>
  <rect class="header-bar" x="0" y="22" width="900" height="14"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>
  <text class="prompt" x="450" y="23" text-anchor="middle">suraj@coep — bash — 90×24</text>

  <!-- Body -->
  <text class="prompt" x="40" y="90">suraj@coep:~$ figlet name</text>
  <text class="name" x="40" y="148">SURAJ WAKHURE</text>

  <text class="prompt" x="40" y="190">suraj@coep:~$ echo $STATUS</text>
  <text class="line" x="40" y="218">Computer Science &amp; Engineering Student @ COEP Technological University</text>
  <text class="line" x="40" y="244">Building Android apps, full-stack platforms &amp; hackathon products that ship<tspan class="cursor">_</tspan></text>
</svg>
