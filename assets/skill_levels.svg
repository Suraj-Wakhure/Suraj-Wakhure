<svg width="560" height="290" viewBox="0 0 560 290" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0a0e0a; }
      .header-bar { fill: #161b16; }
      .title { font-family: 'Courier New', Courier, monospace; font-size: 14px; fill: #39FF14; }
      .label { font-family: 'Courier New', Courier, monospace; font-size: 13px; fill: #c9ffcf; }
      .pct { font-family: 'Courier New', Courier, monospace; font-size: 13px; fill: #39FF14; font-weight: bold; }
      .track { fill: #14201480; stroke: #1f3a1f; stroke-width: 1; }
      .fillbar { fill: #39FF14; }
      .footer { font-family: 'Courier New', Courier, monospace; font-size: 11px; fill: #5fae5f; font-style: italic; }
    </style>
  </defs>

  <rect class="bg" width="560" height="290" rx="8"/>

  <rect class="header-bar" width="560" height="34" rx="8"/>
  <rect class="header-bar" x="0" y="20" width="560" height="14"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>
  <text class="title" x="280" y="22" text-anchor="middle">cat skill_levels.dat</text>

  <text class="label" x="20" y="66">Android Development</text>
  <rect class="track" x="230" y="56" width="230" height="14" rx="2"/>
