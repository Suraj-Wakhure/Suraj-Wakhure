  <rect class="track" x="230" y="116" width="230" height="14" rx="2"/>
  <rect class="fillbar" x="230" y="116" width="207" height="14" rx="2"/>
  <text class="pct" x="470" y="126">90%</text>

  <text class="label" x="20" y="156">Python</text>
  <rect class="track" x="230" y="146" width="230" height="14" rx="2"/>
